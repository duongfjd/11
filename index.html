<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Share - Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Khung chứa 360x800 */
        .chat-container {
            width: 360px;
            height: 800px;
            background-color: #fdf8ff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        /* Header với nút Back */
        .header {
            background-color: #4CAF50;
            padding: 0 15px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 20px;
            color: #1a1a1a;
        }

        .header i {
            font-size: 20px;
            cursor: pointer;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 500;
        }

        /* Vùng nội dung chat */
        .chat-content {
            flex: 1;
            padding: 20px 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Bong bóng chat chung */
        .message-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 85%;
        }

        .message-wrapper.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-wrapper.received {
            align-self: flex-start;
        }

        /* Avatar nhỏ trong chat */
        .mini-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
        }

        .avatar-t { background-color: #e8f5e9; color: #4CAF50; }
        .avatar-n { background-color: #bbdefb; color: #1976d2; }

        /* Bong bóng tin nhắn */
        .bubble {
            border-radius: 15px;
            padding: 8px;
            position: relative;
        }

        .sent .bubble {
            background-color: #4CAF50;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .received .bubble {
            background-color: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        /* Hình ảnh trong tin nhắn */
        .chat-img {
            width: 100%;
            border-radius: 12px;
            display: block;
            margin-bottom: 4px;
        }

        .msg-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            margin-top: 2px;
        }

        .sent .msg-footer { color: #e0e0e0; }
        .received .msg-footer { color: #888; }

        /* Thanh nhập liệu */
        .input-area {
            background-color: white;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #eee;
        }

        .input-box {
            flex: 1;
            background-color: #f5f5f5;
            border-radius: 25px;
            padding: 10px 20px;
            font-size: 15px;
            color: #888;
        }

        .icon-btn {
            color: #4CAF50;
            font-size: 22px;
            cursor: pointer;
        }

        .send-btn {
            background-color: #4CAF50;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <i class="fas fa-arrow-left"></i>
        <h1>Nguyễn Văn Tày</h1>
    </div>

    <div class="chat-content">
        
        <div class="message-wrapper sent">
            <div class="mini-avatar avatar-t">T</div>
            <div class="bubble">
                <img src="https://via.placeholder.com/200x250/4CAF50/FFFFFF?text=Dog+Meme" alt="Meme" class="chat-img">
                <div class="msg-footer">
                    <span>13:16</span>
                    <i class="fas fa-check-double"></i>
                </div>
            </div>
        </div>

        <div class="message-wrapper sent">
            <div class="mini-avatar avatar-t">T</div>
            <div class="bubble" style="padding: 10px 15px;">
                Thấy chưa
                <div class="msg-footer">
                    <span>13:16</span>
                    <i class="fas fa-check-double"></i>
                </div>
            </div>
        </div>

        <div class="message-wrapper received">
            <div class="mini-avatar avatar-n">N</div>
            <div class="bubble">
                <img src="https://via.placeholder.com/200x150/EEEEEE/333333?text=Video+Thumbnail" alt="Response" class="chat-img">
                <div class="msg-footer">
                    <span>13:58</span>
                </div>
            </div>
        </div>

    </div>

    <div class="input-area">
        <div class="input-box">Nhập tin nhắn...</div>
        <i class="far fa-image icon-btn"></i>
        <div class="send-btn">
            <i class="fas fa-paper-plane"></i>
        </div>
    </div>
</div>

</body>
</html>
