<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Share - Tìm kiếm</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Khung chứa 360x800 */
        .phone-container {
            width: 360px;
            height: 800px;
            background-color: #fdf8ff; /* Màu nền tím nhạt đặc trưng */
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        /* Header xanh lá */
        .header {
            background-color: #4CAF50;
            padding: 15px 20px;
            height: 60px;
            display: flex;
            align-items: center;
        }

        .header h1 {
            color: #000; /* Chữ Tìm kiếm màu đen theo ảnh */
            font-size: 22px;
            font-weight: 500;
        }

        /* Thanh tìm kiếm */
        .search-section {
            padding: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-input-wrapper {
            flex: 1;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #999;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            background-color: white;
        }

        .search-input::placeholder {
            color: #666;
        }

        .search-button {
            background-color: #4CAF50;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 8px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* Trạng thái trống */
        .empty-state {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 100px; /* Căn chỉnh vị trí chữ cao hơn một chút */
        }

        .empty-text {
            color: #888;
            font-size: 14px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            height: 70px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #eee;
        }

        .nav-item {
            text-align: center;
            color: #888;
            font-size: 13px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
        }

        .nav-item.active {
            color: #4CAF50;
        }

        .nav-item i {
            font-size: 20px;
        }

        /* Tinh chỉnh riêng cho Icon Search trong Nav */
        .nav-item.active i {
            font-weight: 900;
        }

    </style>
</head>
<body>

<div class="phone-container">
    <div class="header">
        <h1>Tìm kiếm</h1>
    </div>

    <div class="search-section">
        <div class="search-input-wrapper">
            <input type="text" class="search-input" placeholder="Nhập tên nguyên liệu...">
        </div>
        <button class="search-button">
            <i class="fas fa-search"></i>
        </button>
    </div>

    <div class="empty-state">
        <p class="empty-text">Chưa có dữ liệu tìm kiếm</p>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item">
            <i class="fas fa-home"></i>
        </a>
        <a href="#" class="nav-item active">
            <i class="fas fa-search"></i>
            <span>Tìm kiếm</span>
        </a>
        <a href="#" class="nav-item">
            <i class="far fa-comment-alt"></i>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-user"></i>
        </a>
    </div>
</div>

</body>
</html>
