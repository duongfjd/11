<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Food Share - Login</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 360px;
      height: 800px;
      background: linear-gradient(180deg, #7ecbff 0%, #ffd1dc 100%);
      border-radius: 16px;
      padding: 40px 24px;
      color: white;
    }

    .logo {
      width: 96px;
      height: 96px;
      background: white;
      border-radius: 24px;
      margin: 40px auto 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo span {
      font-size: 48px;
      color: #4f8cff;
    }

    h1 {
      text-align: center;
      margin: 8px 0;
      font-size: 28px;
      font-weight: 600;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 32px;
    }

    .input {
      width: 100%;
      height: 48px;
      border-radius: 12px;
      border: none;
      padding: 0 16px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .button {
      width: 100%;
      height: 52px;
      border-radius: 14px;
      border: none;
      background: #4f8cff;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    .social {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin: 24px 0;
    }

    .social div {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 20px;
    }

    .google { color: #db4437; }
    .facebook { color: #1877f2; }

    .register {
      text-align: center;
      font-size: 14px;
      opacity: 0.9;
    }

    .register span {
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="logo">
      <span>🍴</span>
    </div>

    <h1>Food Share</h1>
    <div class="subtitle">Chia sẻ thực phẩm – Kết nối & bền vững</div>

    <input class="input" type="email" placeholder="Email">
    <input class="input" type="password" placeholder="Mật khẩu">

    <button class="button">Đăng nhập</button>

    <div class="social">
      <div class="google">G</div>
      <div class="facebook">f</div>
    </div>

    <div class="register">
      Chưa có tài khoản? <span>Đăng ký</span>
    </div>
  </div>

</body>
</html>
