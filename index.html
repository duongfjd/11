<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Share - Đăng ký</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Khung chứa 360x800 với Gradient nền */
        .auth-container {
            width: 360px;
            height: 800px;
            background: linear-gradient(180deg, #4facfe 0%, #fbc2eb 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 30px;
            position: relative;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        /* Logo & Brand */
        .logo-box {
            width: 100px;
            height: 100px;
            background-color: white;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .logo-box i {
            font-size: 50px;
            color: #4facfe; /* Màu xanh trùng với gradient đầu */
        }

        .brand-name {
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .slogan {
            color: white;
            font-size: 14px;
            text-align: center;
            margin-bottom: 50px;
            opacity: 0.9;
        }

        /* Form Inputs */
        .form-auth {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-item {
            width: 100%;
            padding: 15px 20px;
            border-radius: 15px;
            border: none;
            background-color: white;
            font-size: 16px;
            outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .input-item::placeholder {
            color: #888;
        }

        /* Button */
        .btn-register {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background-color: white;
            color: #4facfe;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Bottom Text */
        .bottom-text {
            margin-top: 25px;
            color: white;
            font-size: 14px;
        }

        .bottom-text span {
            font-weight: bold;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-box">
        <i class="fas fa-utensils"></i>
    </div>

    <h1 class="brand-name">Food Share</h1>
    <p class="slogan">Chia sẻ thực phẩm – Kết nối & bền vững</p>

    <div class="form-auth">
        <input type="email" class="input-item" placeholder="Email">
        <input type="password" class="input-item" placeholder="Mật khẩu">
	<input type="password" class="input-item" placeholder="Nhập Lại Mật khẩu">
        <button class="btn-register">Đăng ký</button>
    </div>

    <p class="bottom-text">Đã có tài khoản? <span>Đăng nhập</span></p>
</div>

</body>
</html>
