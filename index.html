<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Share - Đăng bài</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Khung chứa 360x800 */
        .app-container {
            width: 360px;
            height: 800px;
            background-color: #fdf8ff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        /* Header */
        .header {
            background-color: #4CAF50;
            padding: 0 15px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header i {
            font-size: 20px;
            color: #1a1a1a;
            cursor: pointer;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 500;
            color: #1a1a1a;
        }

        /* Form Content */
        .form-content {
            flex: 1;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        /* Input Groups */
        .input-group {
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #777;
            border-radius: 8px;
            padding: 12px 15px;
            gap: 15px;
        }

        .input-group i {
            font-size: 20px;
            color: #444;
            width: 24px;
            text-align: center;
        }

        .input-group input, .input-group textarea {
            border: none;
            outline: none;
            width: 100%;
            font-size: 15px;
            color: #333;
            background: transparent;
        }

        /* Textarea specific */
        .textarea-group {
            align-items: flex-start;
            min-height: 120px;
        }

        /* Image Upload Box */
        .upload-box {
            border: 1px solid #4CAF50;
            border-radius: 12px;
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background-color: transparent;
            cursor: pointer;
            margin-top: 5px;
        }

        .upload-box i {
            font-size: 40px;
            color: #4CAF50;
        }

        .upload-box span {
            font-size: 14px;
            color: #444;
        }

        /* Submit Button Container */
        .footer {
            padding: 20px 15px 40px 15px;
        }

        .submit-btn {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <i class="fas fa-arrow-left"></i>
        <h1>Đăng bài chia sẻ</h1>
    </div>

    <div class="form-content">
        <div class="input-group">
            <i class="fas fa-utensils"></i>
            <input type="text" placeholder="Tên nguyên liệu *">
        </div>

        <div class="input-group">
            <i class="fas fa-balance-scale"></i>
            <input type="text" placeholder="Số lượng *">
        </div>

        <div class="input-group">
            <i class="fas fa-map-marker-alt"></i>
            <input type="text" placeholder="Địa chỉ *">
        </div>

        <div class="input-group textarea-group">
            <i class="fas fa-file-alt"></i>
            <textarea placeholder="Mô tả thêm"></textarea>
        </div>

        <div class="upload-box">
            <i class="fas fa-image"></i>
            <span>Chọn ảnh sản phẩm</span>
        </div>
    </div>

    <div class="footer">
        <button class="submit-btn">Đăng bài</button>
    </div>
</div>

</body>
</html>
