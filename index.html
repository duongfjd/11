<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Enjoy - Đã Lưu UI Perfect for Figma</title>
    <!-- Thư viện icon FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .serif-title {
            font-family: 'Playfair Display', Georgia, serif;
        }
        /* Ép cứng khung hình chuẩn 720x1280 để clone vào Figma không bị lệch */
        .figma-canvas {
            width: 720px;
            height: 1280px;
            background-color: #F6F4EB; /* Màu nền kem nhạt từ ảnh gốc */
        }
    </style>
</head>
<body class="bg-gray-900 flex justify-center items-center min-h-screen">

    <!-- KHUNG MÀN HÌNH CHUẨN 720x1280 -->
    <div class="figma-canvas relative flex flex-col justify-between overflow-hidden shadow-2xl p-6">
        
        <!-- TIÊU ĐỀ TRANG -->
        <div class="pt-4 self-start w-full">
            <h1 class="serif-title text-4xl font-extrabold text-slate-950 tracking-tight">Đã lưu</h1>
        </div>

        <!-- TRẠNG THÁI CHƯA ĐĂNG NHẬP (CENTER CONTENT) -->
        <div class="flex-1 flex flex-col items-center justify-center space-y-6 -mt-20">
            <!-- Icon Ổ khóa lớn màu xám nhạt -->
            <div class="text-gray-300 text-8xl mb-2">
                <i class="fa-regular fa-lock"></i>
            </div>
            
            <!-- Dòng chữ thông báo -->
            <p class="text-gray-400 text-lg font-medium tracking-wide">
                Đăng nhập để xem bài viết đã lưu
            </p>
            
            <!-- Nút Đăng nhập -->
            <button class="bg-[#0F172A] text-white px-8 py-3 rounded-full text-base font-semibold hover:bg-slate-800 transition shadow-xs cursor-pointer">
                Đăng nhập
            </button>
        </div>

        <!-- BOTTOM NAVIGATION BAR (Đã active nút "Đã lưu") -->
        <div class="absolute bottom-6 left-6 right-6 bg-white/90 backdrop-blur-md rounded-3xl shadow-xl border border-white/40 h-20 flex justify-around items-center px-4 z-10">
            <!-- Trang chủ -->
            <div class="flex flex-col items-center justify-center text-gray-400 cursor-pointer">
                <i class="fa-regular fa-house-chimney text-lg"></i>
                <span class="text-[11px] font-medium mt-1.5">Trang chủ</span>
            </div>
            <!-- Tất cả tin -->
            <div class="flex flex-col items-center justify-center text-gray-400 cursor-pointer">
                <i class="fa-regular fa-rectangle-list text-lg"></i>
                <span class="text-[11px] font-medium mt-1.5">Tất cả tin</span>
            </div>
            <!-- Đã lưu (Active - Màu xanh dương) -->
            <div class="flex flex-col items-center justify-center text-blue-500 cursor-pointer">
                <i class="fa-solid fa-bookmark text-lg"></i>
                <span class="text-[11px] font-bold mt-1.5">Đã lưu</span>
            </div>
            <!-- Hồ sơ -->
            <div class="flex flex-col items-center justify-center text-gray-400 cursor-pointer">
                <i class="fa-regular fa-user text-lg"></i>
                <span class="text-[11px] font-medium mt-1.5">Hồ sơ</span>
            </div>
        </div>

    </div>

</body>
</html>
