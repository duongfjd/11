<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Share - Tin nhắn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Khung chứa 360x800 */
        .container {
            width: 360px;
            height: 800px;
            background-color: #fdf8ff;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        /* Header */
        .header {
            background-color: #4CAF50;
            padding: 15px 20px;
            height: 65px;
            display: flex;
            align-items: center;
        }

        .header h1 {
            color: #1a1a1a;
            font-size: 22px;
            font-weight: 500;
        }

        /* Danh sách tin nhắn */
        .chat-list {
            flex: 1;
            padding-top: 10px;
        }

        .chat-item {
            display: flex;
            padding: 15px 20px;
            align-items: center;
            border-bottom: 1px solid #eee;
            position: relative;
        }

        /* Avatar */
        .avatar {
            width: 55px;
            height: 55px;
            background-color: #c8e6c9;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            color: #2e7d32;
            font-weight: bold;
            margin-right: 15px;
        }

        .chat-info {
            flex: 1;
        }

        .name-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .name {
            font-weight: bold;
            font-size: 16px;
            color: #1a1a1a;
        }

        .time {
            font-size: 12px;
            color: #4CAF50; /* Màu xanh lá cho tin nhắn mới nhất */
            font-weight: bold;
        }

        .time.gray {
            color: #888;
            font-weight: normal;
        }

        .message-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #777;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #4CAF50;
            border-radius: 50%;
        }

        .check-icon {
            font-size: 12px;
            margin-right: 4px;
        }

        /* Bottom Nav */
        .bottom-nav {
            height: 70px;
            background: #fdf8ff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #eee;
        }

        .nav-item {
            text-align: center;
            color: #888;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-item.active {
            color: #4CAF50;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item span {
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Tin nhắn</h1>
    </div>

    <div class="chat-list">
        <div class="chat-item">
            <div class="avatar">N</div>
            <div class="chat-info">
                <div class="name-row">
                    <span class="name">Nguyễn Văn Tày</span>
                    <span class="time">13:58</span>
                </div>
                <div class="message-row">
                    <span>[Ảnh]</span>
                    <div class="status-dot"></div>
                </div>
            </div>
        </div>

        <div class="chat-item">
            <div class="avatar">T</div>
            <div class="chat-info">
                <div class="name-row">
                    <span class="name">Tày A Man</span>
                    <span class="time gray">13:06</span>
                </div>
                <div class="message-row">
                    <span><i class="fas fa-check-double check-icon"></i> [Ảnh]</span>
                </div>
            </div>
        </div>

        <div class="chat-item">
            <div class="avatar">P</div>
            <div class="chat-info">
                <div class="name-row">
                    <span class="name">Phùng Canh Mộ</span>
                    <span class="time gray">11:30</span>
                </div>
                <div class="message-row">
                    <span><i class="fas fa-check-double check-icon"></i> [Ảnh]</span>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item">
            <i class="fas fa-home"></i>
        </div>
        <div class="nav-item">
            <i class="fas fa-search"></i>
        </div>
        <div class="nav-item active">
            <i class="fas fa-comment-alt"></i>
            <span>Tin nhắn</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-user"></i>
        </div>
    </div>
</div>

</body>
</html>
